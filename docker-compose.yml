version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Pass NEXT_PUBLIC_ vars at build time so Next.js can embed them
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        - NEXT_PUBLIC_APP_NAME=OMEN
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
      - API_URL=http://backend-node:4000
      - PYTHON_API_URL=http://backend-python:8000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend-node
      - backend-python

  backend-node:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend-node/.env
    environment:
      - PORT=4000
      - DB_URL=postgres://omen:omen@postgres:5432/omen
      - REDIS_URL=redis://redis:6379
      - PYTHON_API_URL=http://backend-python:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  backend-python:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend-python/.env
    environment:
      - DB_URL=postgres://omen:omen@postgres:5432/omen
      - REDIS_URL=redis://redis:6379
      - ZAP_BASE_URL=http://zap:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  zap:
    image: owasp/zap2docker-stable
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.disablekey=false
      -config api.key=${ZAP_API_KEY:-changeme}
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omen
      POSTGRES_PASSWORD: omen
      POSTGRES_DB: omen
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend-node/src/config/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omen"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
